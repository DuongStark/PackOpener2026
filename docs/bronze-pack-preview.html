<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bronze Pack Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e0d0b;
        --card: #28150b;
        --bronze-900: #251006;
        --bronze-800: #3a1a0b;
        --bronze-700: #5a2b12;
        --bronze-600: #8b4b22;
        --bronze-500: #b56f37;
        --bronze-300: #e8ac68;
        --bronze-200: #ffd7a1;
        --cream: #fff4de;
        --muted: #d8b58c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 48% 14%, rgba(232, 172, 104, 0.2), transparent 28%),
          radial-gradient(circle at 20% 85%, rgba(100, 55, 26, 0.34), transparent 28%),
          linear-gradient(180deg, #18120e 0%, var(--bg) 62%, #050504 100%);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: var(--cream);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
        background-size: 38px 38px;
        mask-image: radial-gradient(circle at 50% 45%, black, transparent 72%);
      }

      .stage {
        position: relative;
        width: min(94vw, 860px);
        min-height: 620px;
        display: grid;
        place-items: center;
        padding: 48px 24px;
      }

      .stage::after {
        content: "";
        position: absolute;
        width: 330px;
        height: 54px;
        bottom: 68px;
        border-radius: 50%;
        background: radial-gradient(ellipse, rgba(0, 0, 0, 0.72), transparent 68%);
        filter: blur(4px);
      }

      .pack-wrap {
        position: relative;
        z-index: 1;
        width: min(344px, 82vw);
        aspect-ratio: 0.7;
        transform: perspective(1100px) rotateX(5deg) rotateY(-8deg);
        transform-style: preserve-3d;
        transition: transform 300ms ease;
      }

      .pack-wrap:hover {
        transform: perspective(1100px) rotateX(2deg) rotateY(0deg) translateY(-10px);
      }

      .pack {
        position: absolute;
        inset: 0;
        overflow: hidden;
        border-radius: 22px;
        background:
          radial-gradient(circle at 34% 18%, rgba(255, 226, 182, 0.42), transparent 15%),
          radial-gradient(circle at 82% 35%, rgba(255, 214, 150, 0.18), transparent 28%),
          linear-gradient(138deg, #2b1207 0%, #7a3d1b 36%, #c47b3e 55%, #4a210e 100%);
        border: 1px solid rgba(255, 218, 166, 0.55);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.16),
          inset 18px 0 36px rgba(255, 235, 194, 0.08),
          inset -28px 0 50px rgba(0, 0, 0, 0.32),
          inset 0 -75px 95px rgba(0, 0, 0, 0.44),
          0 42px 72px rgba(0, 0, 0, 0.58);
      }

      .pack::before {
        content: "";
        position: absolute;
        inset: -35%;
        background:
          linear-gradient(113deg, transparent 35%, rgba(255, 250, 230, 0.5) 45%, transparent 55%),
          repeating-linear-gradient(
            132deg,
            rgba(255, 242, 211, 0.1) 0 1px,
            transparent 1px 7px
          );
        mix-blend-mode: screen;
        opacity: 0.48;
        transform: translateX(-34%) rotate(5deg);
        transition: transform 520ms ease;
      }

      .pack-wrap:hover .pack::before {
        transform: translateX(18%) rotate(5deg);
      }

      .pack::after {
        content: "";
        position: absolute;
        inset: 14px;
        border-radius: 17px;
        border: 1px solid rgba(255, 232, 190, 0.34);
        box-shadow:
          inset 0 0 0 1px rgba(0, 0, 0, 0.16),
          0 0 0 1px rgba(0, 0, 0, 0.2);
        pointer-events: none;
      }

      .side-depth {
        position: absolute;
        top: 18px;
        right: -20px;
        width: 34px;
        height: calc(100% - 36px);
        border-radius: 0 18px 18px 0;
        background: linear-gradient(180deg, #7a3b19, #2a1107 58%, #100704);
        transform: translateZ(-22px) rotateY(38deg);
        filter: brightness(0.8);
      }

      .crimp {
        position: absolute;
        left: 0;
        right: 0;
        height: 46px;
        z-index: 2;
        background:
          repeating-linear-gradient(
            90deg,
            rgba(255, 231, 187, 0.32) 0 5px,
            rgba(42, 18, 7, 0.32) 5px 10px
          ),
          linear-gradient(180deg, rgba(255, 228, 179, 0.24), rgba(0, 0, 0, 0.18));
        border-block: 1px solid rgba(255, 229, 183, 0.28);
      }

      .crimp.top {
        top: 0;
      }

      .crimp.bottom {
        bottom: 0;
        transform: scaleY(-1);
      }

      .pattern {
        position: absolute;
        inset: 52px 18px;
        opacity: 0.32;
        background:
          radial-gradient(circle at 50% 50%, transparent 0 9px, rgba(255, 235, 198, 0.28) 10px 11px, transparent 12px),
          linear-gradient(30deg, transparent 0 45%, rgba(255, 235, 198, 0.13) 46% 48%, transparent 49%),
          linear-gradient(150deg, transparent 0 45%, rgba(255, 235, 198, 0.1) 46% 48%, transparent 49%);
        background-size: 58px 58px, 76px 76px, 76px 76px;
        mask-image: linear-gradient(180deg, transparent, black 18%, black 82%, transparent);
      }

      .top-label {
        position: absolute;
        top: 62px;
        left: 28px;
        right: 28px;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 241, 215, 0.78);
      }

      .mark {
        display: inline-grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(32, 13, 5, 0.58);
        border: 1px solid rgba(255, 226, 178, 0.32);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }

      .mark svg {
        width: 19px;
        color: var(--bronze-200);
      }

      .title-panel {
        position: absolute;
        top: 96px;
        left: 26px;
        right: 26px;
        z-index: 3;
        padding: 14px 16px 13px;
        text-align: center;
        border-radius: 13px;
        background:
          linear-gradient(90deg, transparent, rgba(255, 229, 184, 0.12), transparent),
          rgba(31, 13, 5, 0.68);
        border: 1px solid rgba(255, 221, 173, 0.28);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.11),
          0 10px 22px rgba(0, 0, 0, 0.2);
      }

      .title {
        margin: 0;
        font-size: 30px;
        line-height: 0.92;
        font-weight: 950;
        letter-spacing: 0;
        text-transform: uppercase;
        color: #fff3dc;
        text-shadow:
          0 2px 0 rgba(75, 35, 13, 0.8),
          0 8px 18px rgba(0, 0, 0, 0.48);
      }

      .subtitle {
        margin-top: 7px;
        font-size: 11px;
        font-weight: 850;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--bronze-200);
      }

      .crest {
        position: absolute;
        z-index: 3;
        top: 205px;
        left: 50%;
        width: 178px;
        height: 196px;
        display: grid;
        place-items: center;
        transform: translateX(-50%);
      }

      .crest::before {
        content: "";
        position: absolute;
        inset: 0;
        clip-path: polygon(50% 0, 91% 18%, 83% 74%, 50% 100%, 17% 74%, 9% 18%);
        background:
          radial-gradient(circle at 50% 18%, rgba(255, 245, 220, 0.44), transparent 30%),
          linear-gradient(145deg, #2b1207, #a86634 54%, #351707);
        border: 1px solid rgba(255, 232, 190, 0.55);
        box-shadow:
          inset 0 0 0 3px rgba(255, 235, 198, 0.11),
          inset 0 -34px 46px rgba(0, 0, 0, 0.34),
          0 18px 26px rgba(0, 0, 0, 0.34);
      }

      .crest::after {
        content: "";
        position: absolute;
        inset: 16px;
        clip-path: polygon(50% 0, 91% 18%, 83% 74%, 50% 100%, 17% 74%, 9% 18%);
        border: 1px solid rgba(255, 231, 190, 0.3);
      }

      .crest-inner {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 10px;
        place-items: center;
        transform: translateY(-3px);
      }

      .crest-inner svg {
        width: 72px;
        color: #ffe0ac;
        filter: drop-shadow(0 5px 8px rgba(0, 0, 0, 0.36));
      }

      .tier {
        width: 88px;
        padding: 5px 0;
        border-radius: 999px;
        text-align: center;
        background: rgba(25, 10, 4, 0.64);
        border: 1px solid rgba(255, 224, 172, 0.25);
        color: #ffe0ac;
        font-size: 10px;
        font-weight: 950;
        letter-spacing: 0.1em;
      }

      .stat-row {
        position: absolute;
        z-index: 4;
        left: 28px;
        right: 28px;
        bottom: 66px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .stat {
        min-width: 0;
        padding: 12px 10px;
        border-radius: 13px;
        background:
          linear-gradient(180deg, rgba(255, 236, 202, 0.1), rgba(0, 0, 0, 0.16)),
          rgba(26, 10, 4, 0.74);
        border: 1px solid rgba(255, 222, 174, 0.25);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.1),
          0 9px 18px rgba(0, 0, 0, 0.18);
      }

      .stat span {
        display: block;
        font-size: 10px;
        font-weight: 850;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(255, 224, 178, 0.68);
      }

      .stat strong {
        display: block;
        margin-top: 3px;
        font-size: 17px;
        line-height: 1;
        color: #fff2d7;
      }

      .serial {
        position: absolute;
        z-index: 4;
        bottom: 27px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.18em;
        color: rgba(255, 227, 184, 0.5);
      }

      .spark {
        position: absolute;
        z-index: 4;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #fff5d7;
        box-shadow: 0 0 15px 4px rgba(255, 213, 142, 0.5);
        opacity: 0.86;
      }

      .spark.one {
        top: 190px;
        left: 44px;
      }

      .spark.two {
        top: 174px;
        right: 54px;
        width: 4px;
        height: 4px;
      }

      .spark.three {
        bottom: 150px;
        right: 38px;
        width: 3px;
        height: 3px;
      }

      .caption {
        position: relative;
        z-index: 1;
        margin-top: 32px;
        text-align: center;
        color: rgba(255, 240, 217, 0.7);
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section>
        <div class="pack-wrap" aria-label="Bronze Pack preview">
          <div class="side-depth"></div>
          <article class="pack">
            <div class="crimp top"></div>
            <div class="crimp bottom"></div>
            <div class="pattern"></div>
            <div class="top-label">
              <span class="mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="M12 3.2 19 6v5.1c0 4.5-2.8 8.3-7 9.7-4.2-1.4-7-5.2-7-9.7V6l7-2.8Z"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
              <span>Pack Opener 26</span>
              <span class="mark" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path
                    d="m12 3 2.5 5.8 6.3.6-4.8 4.1 1.4 6.1-5.4-3.2-5.4 3.2 1.4-6.1-4.8-4.1 6.3-.6L12 3Z"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linejoin="round"
                  />
                </svg>
              </span>
            </div>
            <div class="title-panel">
              <h1 class="title">Bronze<br />Pack</h1>
              <div class="subtitle">Common Series</div>
            </div>
            <div class="crest" aria-hidden="true">
              <div class="crest-inner">
                <svg viewBox="0 0 64 64" fill="none">
                  <circle cx="32" cy="32" r="19" stroke="currentColor" stroke-width="4" />
                  <path
                    d="M32 13v38M14 32h36M20.5 19.5c6.3 5.6 16.7 5.6 23 0M20.5 44.5c6.3-5.6 16.7-5.6 23 0"
                    stroke="currentColor"
                    stroke-width="3"
                    stroke-linecap="round"
                  />
                </svg>
                <div class="tier">BRONZE</div>
              </div>
            </div>
            <div class="stat-row">
              <div class="stat">
                <span>Contains</span>
                <strong>5 Cards</strong>
              </div>
              <div class="stat">
                <span>Price</span>
                <strong>25 Coin</strong>
              </div>
            </div>
            <div class="serial">BRZ-COMMON-001</div>
            <i class="spark one"></i>
            <i class="spark two"></i>
            <i class="spark three"></i>
          </article>
        </div>
        <p class="caption">CSS-only detailed pack concept. Hover the pack.</p>
      </section>
    </main>
  </body>
</html>
